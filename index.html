<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTMD Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        [data-theme="light"]{--bg:#EEEEEE;--surface:#ffffff;--card-border:#dcdcdc;--text:#0d0d12;--text2:#3d3d4e;--dim:#8a8a99;--green:#00c875;--green-dark:#00a35c;--green-bg:#e6faf0;--navy:#0d0d12;--blue:#4361ee;--amber:#f59e0b;--red:#ef4444;--purple:#7c3aed;--hover-bg:#f0f0f2;--grid-color:#f0f0f2;--pill-active-bg:#0d0d12;--pill-active-text:#fff;--chip-bg:white;--chip-border:#ebebeb}
        [data-theme="dim"]{--bg:#212121;--surface:#2f2f2f;--card-border:#3a3a3a;--text:#ececec;--text2:#b4b4b4;--dim:#9a9a9a;--green:#19c37d;--green-dark:#34d399;--green-bg:rgba(25,195,125,.12);--navy:#ececec;--blue:#7aa2ff;--amber:#f5b14c;--red:#f87171;--purple:#b794f6;--hover-bg:#262626;--grid-color:#3a3a3a;--pill-active-bg:#ececec;--pill-active-text:#212121;--chip-bg:#262626;--chip-border:#3a3a3a}
        [data-theme="midnight"]{--bg:#000000;--surface:#0a0a0a;--card-border:#1a1a1a;--text:#e4e4e7;--text2:#a1a1aa;--dim:#52525b;--green:#00e88a;--green-dark:#00ff99;--green-bg:rgba(0,232,138,.08);--navy:#e4e4e7;--blue:#818cf8;--amber:#fbbf24;--red:#f87171;--purple:#c4b5fd;--hover-bg:#111;--grid-color:#1a1a1a;--pill-active-bg:#00e88a;--pill-active-text:#000;--chip-bg:#0f0f0f;--chip-border:#1a1a1a}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;padding:0;overflow-x:auto;zoom:.75}
        .container{width:max-content;min-width:1260px;max-width:none;margin:0 auto;padding:20px 0 10px}
        .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:16px}
        .header-left{display:flex;align-items:center;gap:10px}
        .logo-icon{width:36px;height:36px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;color:white}
        .header-left h1{font-size:1.6em;font-weight:900;letter-spacing:-.5px;color:var(--text)}
        .header-left .badge{background:none;color:var(--text);font-size:1.6em;font-weight:900;letter-spacing:-.5px;padding:0;margin-left:0}
        .theme-switch{display:flex;gap:6px;background:var(--surface);border:1px solid var(--card-border);border-radius:12px;padding:4px}
        .theme-btn{width:36px;height:36px;border-radius:8px;border:2px solid transparent;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:.78em;font-weight:800;line-height:1}
        .theme-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
        .theme-btn:hover{border-color:var(--green)}
        .theme-btn.active{border-color:var(--green);box-shadow:0 0 0 2px var(--green-bg)}
        .campaign-picker{position:relative;display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--card-border);border-radius:14px;padding:6px 10px 6px 12px;min-width:180px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
        .campaign-picker .cp-label{font-size:.62em;font-weight:700;letter-spacing:1.3px;color:var(--dim);text-transform:uppercase;white-space:nowrap}
        .campaign-trigger{flex:1;min-width:120px;border:0;background:transparent;color:var(--text);font-size:.86em;font-weight:700;outline:none;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;padding:2px 0;text-align:left}
        .campaign-trigger svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:transform .18s ease}
        .campaign-picker.open .campaign-trigger svg{transform:rotate(180deg)}
        .campaign-menu{position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--surface);border:1px solid var(--card-border);border-radius:14px;padding:6px;box-shadow:0 18px 40px rgba(0,0,0,.16);display:none;z-index:30;max-height:280px;overflow:auto}
        .campaign-picker.open .campaign-menu{display:block}
        .campaign-option{width:100%;border:0;background:transparent;color:var(--text);font:inherit;font-size:.86em;font-weight:700;text-align:left;padding:11px 12px;border-radius:10px;cursor:pointer;transition:background .15s,color .15s}
        .campaign-option:hover{background:var(--hover-bg)}
        .campaign-option.is-active{background:var(--pill-active-bg);color:var(--pill-active-text)}
        .refresh-btn{position:relative;width:44px;height:44px;border-radius:12px;border:1px solid var(--card-border);background:linear-gradient(180deg,var(--surface) 0%,var(--hover-bg) 100%);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .16s ease,box-shadow .2s ease,border-color .2s ease,background .2s ease,color .2s ease;box-shadow:0 1px 2px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.35)}
        .refresh-btn:hover{transform:translateY(-1px);border-color:var(--green);box-shadow:0 8px 18px rgba(0,0,0,.12),0 0 0 3px var(--green-bg)}
        .refresh-btn svg{width:20px;height:20px;overflow:visible}
        .refresh-btn .icon-refresh,.refresh-btn .icon-stop{transition:opacity .2s ease,transform .2s ease}
        .refresh-btn:hover .icon-refresh .r-body{transform:rotate(-18deg);transform-origin:12px 12px;transition:transform .22s cubic-bezier(.2,.8,.2,1)}
        .refresh-btn .icon-stop{display:none}
        .refresh-btn.is-loading .icon-refresh{display:none}
        .refresh-btn.is-loading .icon-stop{display:block}
        .refresh-btn.is-loading .spin-ring{animation:refreshSpin .95s linear infinite;transform-origin:12px 12px}
        @keyframes refreshSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        .ch-row{display:flex;align-items:center;gap:8px;margin-bottom:24px;flex-wrap:wrap}
        .ch-label{font-size:.72em;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;margin-right:4px}
        .ch-pill{padding:8px 20px;border-radius:100px;font-size:.82em;font-weight:600;border:1.5px solid var(--card-border);background:var(--bg);color:var(--text2);cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif}
        .ch-pill.on{background:var(--pill-active-bg);color:var(--pill-active-text);border-color:var(--pill-active-bg)}
        .filters{display:grid;grid-template-columns:repeat(4,minmax(180px,1fr));gap:12px;margin-bottom:18px}
        .card{background:var(--surface);border:1px solid var(--card-border);border-radius:16px;padding:18px 20px}
        .stack{display:grid;gap:18px}
        .scorecard-row{display:grid;grid-template-columns:repeat(6,minmax(170px,1fr));gap:12px;margin-bottom:18px}
        .data-row{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
        .card h3{font-size:1em;font-weight:800;margin-bottom:8px;color:var(--text)}
        .card-sub{font-size:.75em;color:var(--dim);margin-bottom:10px}
        .chart{height:290px}
        .chart.tall{height:360px}
        .chart-card{margin-bottom:18px;padding-top:20px}
        .chart-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:10px}
        .chart-card .campaign-picker{min-width:210px}
        .kpi{background:var(--chip-bg);border:1px solid var(--chip-border);border-radius:16px;padding:16px 16px 14px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
        .kpi-label{font-size:.62em;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1.6px;margin-bottom:8px}
        .kpi-value{font-size:2em;font-weight:900;line-height:1;letter-spacing:-1px}
        .kpi-sub{font-size:.75em;color:var(--dim);margin-top:6px}
        .tbl{width:100%;border-collapse:collapse}
        .tbl th{font-size:.62em;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:2px;text-align:left;padding:12px 14px;border-bottom:2px solid var(--card-border)}
        .tbl td{font-size:.88em;padding:12px 14px;border-bottom:1px solid var(--card-border);color:var(--text2)}
        .tbl tbody tr:last-child td{border-bottom:none}
        .num{font-weight:800;font-variant-numeric:tabular-nums}
        .footer{text-align:center;margin-top:28px;font-size:.68em;color:var(--dim);letter-spacing:.5px}
        .loading-state{display:none;min-height:calc(100vh - 160px);align-items:center;justify-content:center;padding:20px 0 40px}
        .is-refreshing .loading-state{display:flex}
        .is-refreshing .report-content{display:none}
        .loading-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center}
        .loading-spinner{width:72px;height:72px;border-radius:50%;border:6px solid rgba(0,200,117,.16);border-top-color:var(--green);border-right-color:var(--green);animation:loadingSpin .8s linear infinite;box-shadow:0 0 0 1px rgba(0,200,117,.06)}
        @keyframes loadingSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        @media(max-width:1200px){.scorecard-row{grid-template-columns:repeat(3,minmax(170px,1fr))}.data-row{grid-template-columns:1fr}}
        @media(max-width:900px){.filters{grid-template-columns:repeat(2,minmax(180px,1fr))}.chart-head{flex-direction:column;align-items:stretch}.chart-card .campaign-picker{width:100%}}
    </style>
</head>
<body class="is-refreshing">
<div class="container">
    <div class="header">
        <div class="header-left">
            <div class="logo-icon" aria-label="Dashboard icon" title="Dashboard">&#x1F4CA;</div>
            <h1>GTMD</h1>
            <span class="badge">Dashboard</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;flex:0 0 auto">
            <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()" title="Refresh data" aria-label="Refresh data" type="button">
                <svg class="icon-refresh" viewBox="0 0 24 24" aria-hidden="true"><g class="r-body" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"></path><path d="M21 3v6h-6"></path></g></svg>
                <svg class="icon-stop" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle class="spin-ring" cx="12" cy="12" r="7.5" stroke-dasharray="24 14"></circle><path d="M9 9L15 15M15 9L9 15"></path></svg>
            </button>
            <div class="theme-switch">
                <button class="theme-btn active" onclick="setTheme('light',this)" title="Light theme" aria-label="Light theme" type="button"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4.5"></circle><path d="M12 2.5v2.5M12 19v2.5M21.5 12H19M5 12H2.5M18.7 5.3l-1.8 1.8M7.1 16.9l-1.8 1.8M18.7 18.7l-1.8-1.8M7.1 7.1L5.3 5.3"></path></svg></button>
                <button class="theme-btn" onclick="setTheme('dim',this)" title="Dim theme" aria-label="Dim theme" type="button"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4 7 7 0 0 0 20 14.5Z"></path></svg></button>
            </div>
        </div>
    </div>

    <div class="ch-row">
        <span class="ch-label">Tab</span>
        <button class="ch-pill on" type="button">GTMB - Revenue</button>
    </div>

    <div class="loading-state" id="loadingState">
        <div class="loading-panel">
            <div class="loading-spinner"></div>
            <div style="font-size:1em;font-weight:700;letter-spacing:.2px;color:var(--text)">Fetching live data</div>
        </div>
    </div>

    <div class="report-content">
        <div class="filters">
            <div class="campaign-picker" id="dealTypePicker">
                <span class="cp-label">Deal Type</span>
                <button class="campaign-trigger" type="button" onclick="toggleFilterMenu('dealType')" aria-haspopup="listbox" aria-expanded="false">
                    <span id="dealTypeTriggerText">All Deal Types</span>
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6"></path></svg>
                </button>
                <div class="campaign-menu" id="dealTypeMenu" role="listbox" aria-label="Deal Type options"></div>
            </div>
            <div class="campaign-picker" id="statusPicker">
                <span class="cp-label">Status</span>
                <button class="campaign-trigger" type="button" onclick="toggleFilterMenu('status')" aria-haspopup="listbox" aria-expanded="false">
                    <span id="statusTriggerText">All Statuses</span>
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6"></path></svg>
                </button>
                <div class="campaign-menu" id="statusMenu" role="listbox" aria-label="Status options"></div>
            </div>
            <div class="campaign-picker" id="yearPicker">
                <span class="cp-label">Year</span>
                <button class="campaign-trigger" type="button" onclick="toggleFilterMenu('year')" aria-haspopup="listbox" aria-expanded="false">
                    <span id="yearTriggerText">All Years</span>
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6"></path></svg>
                </button>
                <div class="campaign-menu" id="yearMenu" role="listbox" aria-label="Year options"></div>
            </div>
            <div class="campaign-picker" id="quarterPicker">
                <span class="cp-label">Quarter</span>
                <button class="campaign-trigger" type="button" onclick="toggleFilterMenu('quarter')" aria-haspopup="listbox" aria-expanded="false">
                    <span id="quarterTriggerText">All Quarters</span>
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6"></path></svg>
                </button>
                <div class="campaign-menu" id="quarterMenu" role="listbox" aria-label="Quarter options"></div>
            </div>
        </div>

        <div class="scorecard-row" id="kpiGrid"></div>

        <div class="card chart-card">
            <div class="chart-head">
                <div>
                    <h3 id="trendChartTitle">Net ARR Trends (Yearly)</h3>
                    <div class="card-sub">Interactive chart view based on current filters</div>
                </div>
                <div class="campaign-picker" id="trendViewPicker" style="min-width:210px">
                    <span class="cp-label">View</span>
                    <button class="campaign-trigger" type="button" onclick="toggleFilterMenu('trendView')" aria-haspopup="listbox" aria-expanded="false">
                        <span id="trendViewTriggerText">Yearly</span>
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6"></path></svg>
                    </button>
                    <div class="campaign-menu" id="trendViewMenu" role="listbox" aria-label="Trend view options"></div>
                </div>
            </div>
            <div class="chart tall" id="trendChart"></div>
        </div>

        <div class="data-row">
            <div class="card">
                <h3>Customers</h3>
                <table class="tbl"><thead><tr><th>Company name</th><th>Total Revenue</th></tr></thead><tbody id="customersTbl"></tbody></table>
            </div>
            <div class="card">
                <h3>Churns</h3>
                <table class="tbl"><thead><tr><th>Company name</th><th>Total Revenue</th></tr></thead><tbody id="churnTbl"></tbody></table>
            </div>
        </div>
    </div>

    <div class="footer">GTMD Revenue Dashboard | <span id="ts">Last refreshed: -</span></div>
</div>

<script>
const SHEET_ID = '1PvgKWPJTfnZgtRyKTcUUteTWEoALBe_qBiSY0kLT-Lo';
const SHEET_NAME = 'GTMDB-Deals';
const API_BASE = window.location.protocol === 'file:' ? 'http://localhost:8788' : '';
const STATE = {
    rows: [],
    filtered: [],
    theme: 'light',
    trendView: 'yearly',
    filters: {
        year: 'all',
        quarter: 'all',
        status: 'all',
        dealType: 'all'
    },
    filterOptions: {
        year: [],
        quarter: [],
        status: [],
        dealType: [],
        trendView: ['Yearly','Quarterly','Monthly']
    }
};

function setTheme(t, el) {
    document.documentElement.setAttribute('data-theme', t);
    document.querySelectorAll('.theme-switch .theme-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    STATE.theme = t;
    if (STATE.filtered.length) renderAll();
}

function closeFilterMenu(key) {
    const picker = document.getElementById(`${key}Picker`);
    const trigger = picker ? picker.querySelector('.campaign-trigger') : null;
    if (picker) picker.classList.remove('open');
    if (trigger) trigger.setAttribute('aria-expanded', 'false');
}

function toggleFilterMenu(key) {
    const picker = document.getElementById(`${key}Picker`);
    const trigger = picker ? picker.querySelector('.campaign-trigger') : null;
    if (!picker || !trigger) return;
    const shouldOpen = !picker.classList.contains('open');
    document.querySelectorAll('.campaign-picker').forEach((node) => {
        node.classList.remove('open');
        const btn = node.querySelector('.campaign-trigger');
        if (btn) btn.setAttribute('aria-expanded', 'false');
    });
    if (shouldOpen) {
        picker.classList.add('open');
        trigger.setAttribute('aria-expanded', 'true');
    }
}

function setFilterValue(key, value) {
    if (key === 'trendView') {
        STATE.trendView = String(value || 'yearly').toLowerCase();
        closeFilterMenu(key);
        renderFilterOptions();
        renderAll();
        return;
    }
    STATE.filters[key] = value;
    closeFilterMenu(key);
    renderFilterOptions();
    applyFilters();
}

function money(v){ return '$' + Number(v || 0).toLocaleString(); }
function shortMoney(v){ const n = Number(v || 0); if (Math.abs(n) >= 1000000) return (n/1000000).toFixed(1).replace('.0','') + 'M'; if (Math.abs(n) >= 1000) return (n/1000).toFixed(0) + 'K'; return String(Math.round(n)); }
function num(v){ return parseFloat(String(v || '').replace(/[$,%\s,]/g,'')) || 0; }

function parseSheetDate(value) {
    const raw = String(value || '').trim();
    if (!raw) return null;
    const direct = new Date(raw);
    if (!Number.isNaN(direct.getTime())) return direct;
    const match = raw.match(/^(\d{1,2})[\/.-](\d{1,2})[\/.-](\d{2,4})$/);
    if (!match) return null;
    let [, a, b, c] = match;
    let month = Number(a);
    let day = Number(b);
    let year = Number(c);
    if (year < 100) year += 2000;
    if (month > 12 && day <= 12) {
        const swap = month;
        month = day;
        day = swap;
    }
    const parsed = new Date(year, month - 1, day);
    return Number.isNaN(parsed.getTime()) ? null : parsed;
}

function canonicalDealType(value) {
    const v = String(value || '').trim();
    const lower = v.toLowerCase();
    if (!v) return 'Unknown';
    if (lower.includes('upsell')) return 'Upsell';
    if (lower.includes('downsell')) return 'Downsell';
    if (lower.includes('new') || lower.includes('logo') || lower.includes('standard') || lower.includes('key')) return 'New Logo';
    return v;
}

function canonicalStatus(value) {
    const v = String(value || '').trim();
    return v || 'Unknown';
}

function parseCsv(text){
    const rows=[]; let row=[]; let cell=''; let inQuotes=false;
    for(let i=0;i<text.length;i++){
        const ch=text[i], next=text[i+1];
        if(ch === '"'){ if(inQuotes && next === '"'){ cell += '"'; i++; } else { inQuotes = !inQuotes; } }
        else if(ch === ',' && !inQuotes){ row.push(cell); cell=''; }
        else if((ch === '\n' || ch === '\r') && !inQuotes){ if(ch === '\r' && next === '\n') i++; row.push(cell); rows.push(row); row=[]; cell=''; }
        else { cell += ch; }
    }
    if(cell.length || row.length){ row.push(cell); rows.push(row); }
    return rows.map(r => r.map(c => String(c || '').trim())).filter(r => r.some(c => c));
}

function findHeaderRow(rows) {
    return rows.findIndex((row) => {
        const joined = row.join(' | ').toLowerCase();
        return joined.includes('deal name') && joined.includes('deal stage') && joined.includes('company name');
    });
}

async function fetchSheet() {
    const proxyUrl = `${API_BASE}/api/sheet?sheetId=${encodeURIComponent(SHEET_ID)}&sheet=${encodeURIComponent(SHEET_NAME)}&format=csv&_t=${Date.now()}`;
    const directUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}&_t=${Date.now()}`;
    let resp = await fetch(proxyUrl, { cache: 'no-store' });
    let text = await resp.text();
    const looksLikeHtml = (text || '').trim().toLowerCase().startsWith('<!doctype html') || (text || '').trim().toLowerCase().startsWith('<html');
    if ((!resp.ok || looksLikeHtml) && window.location.protocol !== 'file:') {
        resp = await fetch(directUrl, { cache: 'no-store' });
        text = await resp.text();
    }
    if (!resp.ok) throw new Error('Failed to fetch deals sheet');
    return parseCsv(text);
}

function rowsToObjects(rows){
    const headerIndex = findHeaderRow(rows);
    if (headerIndex < 0) throw new Error('Could not find GTMDB-Deals header row');
    const headers = rows[headerIndex].map((h, idx) => {
        let value = String(h || '').replace(/\s+/g,' ').trim();
        if (idx === 0 && value.toLowerCase().includes('deal id')) value = 'Deal ID';
        return value;
    });
    return rows.slice(headerIndex + 1).filter(r => r.some(c => c)).map(r => {
        const obj = {};
        headers.forEach((h, i) => obj[h] = r[i] ?? '');
        const closeDate = parseSheetDate(obj['Close Date'] || obj['Create Date'] || '');
        obj.__date = closeDate;
        obj.__amount = num(obj['Amount']);
        obj.__dealType = canonicalDealType(obj['#Deal Type'] || obj['#deal type'] || obj['Deal Type'] || '');
        obj.__status = canonicalStatus(obj['#Status'] || obj['#status'] || obj['Deal Stage'] || '');
        obj.__year = obj.__date ? String(obj.__date.getFullYear()) : 'Unknown';
        obj.__quarter = obj.__date ? `Q${Math.floor(obj.__date.getMonth()/3)+1} ${obj.__date.getFullYear()}` : 'Unknown';
        obj.__month = obj.__date ? `${obj.__date.toLocaleString('en-US',{month:'short'})} ${obj.__date.getFullYear()}` : 'Unknown';
        return obj;
    });
}

function escapeHtml(s){ return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function quarterLabelFromDate(date) {
    return `Q${Math.floor(date.getMonth()/3)+1} ${date.getFullYear()}`;
}

function setupFilters() {
    STATE.filterOptions.year = ['2021','2022','2023','2024','2025','2026'];
    STATE.filterOptions.quarter = [
        'Q4 2021',
        'Q1 2022','Q2 2022','Q3 2022','Q4 2022',
        'Q1 2023','Q2 2023','Q3 2023','Q4 2023',
        'Q1 2024','Q2 2024','Q3 2024','Q4 2024',
        'Q1 2025','Q2 2025','Q3 2025','Q4 2025',
        'Q1 2026','Q2 2026','Q3 2026','Q4 2026'
    ];
    STATE.filterOptions.status = [...new Set(STATE.rows.map(r => r.__status).filter(v => v && v !== 'Unknown'))].sort((a,b) => a.localeCompare(b));
    const preferredTypes = ['New Logo','Upsell','Downsell'];
    const liveTypes = [...new Set(STATE.rows.map(r => r.__dealType).filter(v => v && v !== 'Unknown'))];
    STATE.filterOptions.dealType = preferredTypes.filter(v => liveTypes.includes(v)).concat(liveTypes.filter(v => !preferredTypes.includes(v)).sort((a,b) => a.localeCompare(b)));
    renderFilterOptions();
}

function renderFilterOptions() {
    const defs = {
        dealType: { label: 'All Deal Types', trigger: 'dealTypeTriggerText', menu: 'dealTypeMenu' },
        status: { label: 'All Statuses', trigger: 'statusTriggerText', menu: 'statusMenu' },
        year: { label: 'All Years', trigger: 'yearTriggerText', menu: 'yearMenu' },
        quarter: { label: 'All Quarters', trigger: 'quarterTriggerText', menu: 'quarterMenu' },
        trendView: { label: 'Yearly', trigger: 'trendViewTriggerText', menu: 'trendViewMenu' }
    };
    Object.entries(defs).forEach(([key, def]) => {
        const current = key === 'trendView'
            ? `${STATE.trendView.charAt(0).toUpperCase()}${STATE.trendView.slice(1)}`
            : STATE.filters[key];
        const options = STATE.filterOptions[key] || [];
        const trigger = document.getElementById(def.trigger);
        const menu = document.getElementById(def.menu);
        if (trigger) trigger.textContent = current === 'all' ? def.label : current;
        if (!menu) return;
        if (key === 'trendView') {
            menu.innerHTML = options.map(value => `<button class="campaign-option ${current === value ? 'is-active' : ''}" type="button" role="option" aria-selected="${current === value}" onclick="setFilterValue('trendView', ${JSON.stringify(value)})">${escapeHtml(value)}</button>`).join('');
            return;
        }
        const allButton = `<button class="campaign-option ${current === 'all' ? 'is-active' : ''}" type="button" role="option" aria-selected="${current === 'all'}" onclick="setFilterValue('${key}','all')">${def.label}</button>`;
        const optionButtons = options.map(value => `<button class="campaign-option ${current === value ? 'is-active' : ''}" type="button" role="option" aria-selected="${current === value}" onclick="setFilterValue('${key}', ${JSON.stringify(value)})">${escapeHtml(value)}</button>`).join('');
        menu.innerHTML = allButton + optionButtons;
    });
}

function applyFilters(){
    const { dealType, status, year, quarter } = STATE.filters;
    STATE.filtered = STATE.rows.filter(r =>
        (dealType === 'all' || r.__dealType === dealType) &&
        (status === 'all' || r.__status === status) &&
        (year === 'all' || r.__year === year) &&
        (quarter === 'all' || r.__quarter === quarter)
    );
    renderAll();
}

function stageBucket(row){
    const s = String(row.__status || '').toLowerCase();
    if (s.includes('closed-won')) return 'new';
    if (s.includes('upsell')) return 'upsell';
    if (s.includes('downsell')) return 'downsell';
    if (s.includes('closed-lost') || s.includes('rejected') || s.includes('derailed')) return 'churn';
    return lowerDealType(row.__dealType);
}
function lowerDealType(v){ return String(v || '').trim().toLowerCase(); }

function getMetrics(rows){
    const newArr = rows.filter(r => lowerDealType(r.__dealType).includes('new') || lowerDealType(r.__dealType).includes('logo') || lowerDealType(r.__dealType).includes('standard') || lowerDealType(r.__dealType).includes('key')).reduce((a,r)=>a+r.__amount,0);
    const upsell = rows.filter(r => lowerDealType(r.__dealType) === 'upsell').reduce((a,r)=>a+r.__amount,0);
    const downsell = rows.filter(r => lowerDealType(r.__dealType) === 'downsell').reduce((a,r)=>a+r.__amount,0);
    const churn = rows.filter(r => /closed-lost|rejected|derailed/i.test(r.__status)).reduce((a,r)=>a+r.__amount,0);
    const net = newArr + upsell - Math.abs(downsell) - churn;
    const gross = newArr + upsell + downsell;
    return { newArr, upsell, downsell, churn, net, gross };
}

function aggregateBy(rows, keyFn){
    const groups = {};
    rows.forEach(r => {
        if (!r.__date) return;
        const key = keyFn(r);
        groups[key] ||= { deals:0, amount:0 };
        groups[key].deals += 1;
        groups[key].amount += r.__amount;
    });
    return groups;
}

function renderKpis(metrics){
    const items = [
        ['Gross ARR', metrics.gross, 'Total deal amount'],
        ['New ARR', metrics.newArr, 'Standard + key logo'],
        ['Upsell', metrics.upsell, 'Expansion revenue'],
        ['Downsell', metrics.downsell, 'Contraction revenue'],
        ['Churn', metrics.churn, 'Lost / rejected / derailed'],
        ['Net ARR', metrics.net, 'After churn + downsell']
    ];
    document.getElementById('kpiGrid').innerHTML = items.map(([label,value,sub]) => `
        <div class="kpi">
            <div class="kpi-label">${escapeHtml(label)}</div>
            <div class="kpi-value">${money(value)}</div>
            <div class="kpi-sub">${escapeHtml(sub)}</div>
        </div>
    `).join('');
}

function plotTrend(elId, title, groups, orderedKeys){
    const target = document.getElementById(elId);
    if (!target) return;
    const dealCounts = orderedKeys.map(k => groups[k]?.deals || 0);
    const amounts = orderedKeys.map(k => groups[k]?.amount || 0);
    const axisColor = getComputedStyle(document.documentElement).getPropertyValue('--dim').trim();
    const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text').trim();
    const gridColor = getComputedStyle(document.documentElement).getPropertyValue('--grid-color').trim();
    const surface = getComputedStyle(document.documentElement).getPropertyValue('--surface').trim();
    Plotly.react(elId, [
        { x: orderedKeys, y: dealCounts, type:'bar', name:'Deals', marker:{ color:'#0d0d12', line:{ color:'#0d0d12', width:0 }, opacity:.95 }, hovertemplate:'%{x}<br>Deals: %{y}<extra></extra>' },
        { x: orderedKeys, y: amounts, type:'scatter', mode:'lines+markers', name:'Amount', yaxis:'y2', line:{ color:'#00c875', width:3, shape:'spline', smoothing:0.55 }, marker:{ size:7, color:'#00c875', line:{ color:'#ffffff', width:1.5 } }, hovertemplate:'%{x}<br>Amount: $%{y:,.0f}<extra></extra>' }
    ], {
        margin:{ l:56, r:72, t:18, b:48 },
        paper_bgcolor:'transparent',
        plot_bgcolor:surface,
        font:{ family:'Inter, sans-serif', color:textColor, size:12 },
        xaxis:{ domain:[0.03,0.9], tickfont:{ color:axisColor }, gridcolor:gridColor, zeroline:false, tickangle: orderedKeys.length > 10 ? -35 : 0, automargin:true },
        yaxis:{ title:'Deals', tickfont:{ color:axisColor }, gridcolor:gridColor, zeroline:false, automargin:true },
        yaxis2:{ title:'Amount', overlaying:'y', side:'right', anchor:'free', position:0.94, tickfont:{ color:axisColor }, tickprefix:'$', separatethousands:true, showgrid:false, automargin:true },
        legend:{ orientation:'h', y:1.12, x:0, bgcolor:'rgba(0,0,0,0)' },
        barmode:'group'
    }, { displayModeBar:false, responsive:true });
    requestAnimationFrame(() => Plotly.Plots.resize(target));
}

function renderTables(rows){
    const customers = [...rows].filter(r => num(r['Total Revenue']) > 0).sort((a,b) => num(b['Total Revenue']) - num(a['Total Revenue'])).slice(0,10);
    const churns = [...rows].filter(r => /closed-lost|rejected|derailed/i.test(r.__status)).sort((a,b) => num(b['Total Revenue'] || b.__amount) - num(a['Total Revenue'] || a.__amount)).slice(0,10);
    document.getElementById('customersTbl').innerHTML = customers.map((r,i)=>`<tr><td>${i+1}. ${escapeHtml(r['Company name'] || '-')}</td><td class="num">${money(num(r['Total Revenue']))}</td></tr>`).join('');
    document.getElementById('churnTbl').innerHTML = churns.map((r,i)=>`<tr><td>${i+1}. ${escapeHtml(r['Company name'] || '-')}</td><td class="num">${money(num(r['Total Revenue'] || r.__amount))}</td></tr>`).join('');
}

function renderAll(){
    const rows = STATE.filtered;
    const metrics = getMetrics(rows);
    renderKpis(metrics);

    const yearly = aggregateBy(rows, r => String(r.__date.getFullYear()));
    const yearlyKeys = Object.keys(yearly).sort();

    const quarterly = aggregateBy(rows, r => `Q${Math.floor(r.__date.getMonth()/3)+1}, ${r.__date.getFullYear()}`);
    const quarterlyKeys = Object.keys(quarterly).sort((a,b) => {
        const [qa, ya] = a.replace('Q','').split(', ').map((x,i)=> i===0?Number(x):Number(x));
        const [qb, yb] = b.replace('Q','').split(', ').map((x,i)=> i===0?Number(x):Number(x));
        return ya === yb ? qa - qb : ya - yb;
    });

    const monthly = aggregateBy(rows, r => `${r.__date.getFullYear()}-${String(r.__date.getMonth()+1).padStart(2,'0')}`);
    const monthlyKeys = Object.keys(monthly).sort();
    const monthLabels = monthlyKeys.map(k => {
        const [y,m] = k.split('-').map(Number);
        return new Date(y, m-1, 1).toLocaleString('en-US',{month:'short', year:'numeric'});
    });
    const monthlyLabelMap = {};
    monthlyKeys.forEach((k,i) => monthlyLabelMap[monthLabels[i]] = monthly[k]);

    const trendTitle = document.getElementById('trendChartTitle');
    if (STATE.trendView === 'yearly') {
        if (trendTitle) trendTitle.textContent = 'Net ARR Trends (Yearly)';
        plotTrend('trendChart', 'Net ARR Trends (Yearly)', yearly, yearlyKeys);
    } else if (STATE.trendView === 'quarterly') {
        if (trendTitle) trendTitle.textContent = 'Net ARR Trends (Quarterly)';
        plotTrend('trendChart', 'Net ARR Trends (Quarterly)', quarterly, quarterlyKeys);
    } else {
        if (trendTitle) trendTitle.textContent = 'Net ARR Trends (Monthly)';
        plotTrend('trendChart', 'Net ARR Trends (Monthly)', monthlyLabelMap, monthLabels);
    }
    renderTables(rows);
}

async function manualRefresh(){
    const btn = document.getElementById('refreshBtn');
    document.body.classList.add('is-refreshing');
    btn.classList.add('is-loading');
    try{
        const rows = await fetchSheet();
        STATE.rows = rowsToObjects(rows);
        setupFilters();
        document.body.classList.remove('is-refreshing');
        applyFilters();
        document.getElementById('ts').textContent = 'Last refreshed: ' + new Date().toLocaleString();
    } finally {
        btn.classList.remove('is-loading');
    }
}

document.addEventListener('click', (e) => {
    document.querySelectorAll('.campaign-picker').forEach((picker) => {
        if (!picker.contains(e.target)) {
            picker.classList.remove('open');
            const trigger = picker.querySelector('.campaign-trigger');
            if (trigger) trigger.setAttribute('aria-expanded', 'false');
        }
    });
});

window.addEventListener('resize', () => {
    const chart = document.getElementById('trendChart');
    if (chart && chart.data) Plotly.Plots.resize(chart);
});

manualRefresh();
</script>
